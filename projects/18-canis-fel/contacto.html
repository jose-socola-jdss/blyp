<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendar Cita | Canis & Fel</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Preloader -->
  <div class="preloader"><div class="preloader-spinner"></div></div>


  <!-- Navigation -->
  <nav class="main-nav">
    <div class="container nav-container">
      <a href="index.html" class="nav-logo">🐾 Canis & Fel</a>
      <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="servicios.html">Servicios</a></li>
        <li><a href="contacto.html" class="active">Contacto</a></li>
        <li><a href="contacto.html" class="nav-cta">Agendar</a></li>
      </ul>
      <button class="hamburger" aria-label="Menú">
        <i data-lucide="menu"></i>
      </button>
    </div>
  </nav>

  <!-- Page Banner -->
  <section class="reveal-item page-banner">
    <div class="container">
      <h1>¡Ven a Conocernos!</h1>
    </div>
  </section>

  <!-- Contact Form -->
  <section class="reveal-item section">
    <div class="container">
      <div class="friendly-card">
        <h2>Agenda de Turno</h2>
        <form id="friendly-contact">
          <div class="form-group">
            <label>Tu Nombre</label>
            <input type="text" class="friendly-input" required placeholder="Ej. Ana Pérez">
          </div>
          <div class="form-group">
            <label>Nombre de tu Mascota</label>
            <input type="text" class="friendly-input" required placeholder="Ej. Firulais">
          </div>
          <div class="form-group">
            <label>Mensaje o Consulta médica</label>
            <textarea class="friendly-input" rows="4" required placeholder="Describe brevemente su estado o motivo de consulta..."></textarea>
          </div>
          <button type="submit" class="btn-playful" style="width: 100%; border: none; cursor: pointer;">Solicitar Cita</button>
        </form>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="main-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <h3>Canis & Fel</h3>
        <p>Centro Integral de Cuidado Animal</p>
      </div>
      <div class="footer-dev">
        <span>Desarrollado por</span>
        <a href="../index.html" class="footer-logo-link" aria-label="Ir a Blyp">
          <img src="../blyp_logotipo.svg" alt="Blyp Logo" class="footer-logo">
        </a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
