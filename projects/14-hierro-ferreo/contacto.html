<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar | Hierro Férreo</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Preloader -->
  <div class="preloader"><div class="preloader-spinner"></div></div>


  <!-- Navigation -->
  <nav class="main-nav">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">HIERRO FÉREO</a>
      <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="servicios.html">Planes</a></li>
        <li><a href="contacto.html" class="active">Contacto</a></li>
        <li><a href="contacto.html" class="nav-cta">Clase Prueba</a></li>
      </ul>
      <button class="hamburger" aria-label="Menú">
        <i data-lucide="menu"></i>
      </button>
    </div>
  </nav>

  <!-- Page Banner -->
  <section class="reveal-item page-banner">
    <div class="container">
      <h1>Inicia el cambio hoy</h1>
    </div>
  </section>

  <!-- Contact Form -->
  <section class="reveal-item section">
    <div class="container">
      <div class="raw-form">
        <form id="raw-register">
          <div class="form-group">
            <label>Nombre Completo</label>
            <input type="text" class="form-input" required placeholder="Ingresa tu nombre">
          </div>
          <div class="form-group">
            <label>Correo Electrónico</label>
            <input type="email" class="form-input" required placeholder="tu@correo.com">
          </div>
          <div class="form-group">
            <label>¿Por qué quieres entrenar aquí?</label>
            <textarea class="form-input" rows="4" required placeholder="Detalla tu motivación"></textarea>
          </div>
          <button type="submit" class="btn-aggressive" style="width: 100%;">Enviar Postulación</button>
        </form>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="main-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <h3>HIERRO FÉREO</h3>
        <p>Centro de Alto Rendimiento Industrial</p>
      </div>
      <div class="footer-dev">
        <span>Desarrollado por</span>
        <a href="../index.html" class="footer-logo-link" aria-label="Ir a Blyp">
          <img src="../blyp_logotipo.svg" alt="Blyp Logo" class="footer-logo">
        </a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
