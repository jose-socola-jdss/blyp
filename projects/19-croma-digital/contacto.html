<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Proyecto | Croma Digital</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Preloader -->
  <div class="preloader"><div class="preloader-spinner"></div></div>


  <!-- Navigation -->
  <nav class="main-nav">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">CROMA</a>
      <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="servicios.html">Casos</a></li>
        <li><a href="contacto.html" class="active">Contacto</a></li>
      </ul>
      <button class="hamburger" aria-label="Menú">
        <i data-lucide="menu"></i>
      </button>
    </div>
  </nav>

  <!-- Page Banner -->
  <section class="reveal-item page-banner">
    <div class="container">
      <h1>Crea Algo Inolvidable</h1>
    </div>
  </section>

  <!-- Contact Form -->
  <section class="reveal-item section">
    <div class="container">
      <div class="croma-form-wrap">
        <form id="croma-contact">
          <div class="form-group">
            <label>Tu Nombre / Marca</label>
            <input type="text" class="croma-input" required placeholder="Ej. Juan o Nike">
          </div>
          <div class="form-group">
            <label>Canal de Contacto</label>
            <input type="email" class="croma-input" required placeholder="tu@correo.com">
          </div>
          <div class="form-group">
            <label>La Idea Principal</label>
            <textarea class="croma-input" rows="4" required placeholder="Describe la locura que quieres construir..."></textarea>
          </div>
          <button type="submit" class="btn-croma" style="width: 100%;">Conectar Canales</button>
        </form>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="main-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <h3>CROMA DIGITAL</h3>
        <p>Agencia Creativa Conceptual</p>
      </div>
      <div class="footer-dev">
        <span>Desarrollado por</span>
        <a href="../index.html" class="footer-logo-link" aria-label="Ir a Blyp">
          <img src="../blyp_logotipo.svg" alt="Blyp Logo" class="footer-logo">
        </a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
