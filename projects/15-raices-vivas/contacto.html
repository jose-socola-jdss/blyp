<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donar | Raíces Vivas</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Preloader -->
  <div class="preloader"><div class="preloader-spinner"></div></div>


  <!-- Navigation -->
  <nav class="main-nav">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">Raíces Vivas</a>
      <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="servicios.html">Proyectos</a></li>
        <li><a href="contacto.html" class="active">Donar</a></li>
        <li><a href="contacto.html" class="nav-cta">Donar Ahora</a></li>
      </ul>
      <button class="hamburger" aria-label="Menú">
        <i data-lucide="menu"></i>
      </button>
    </div>
  </nav>

  <!-- Page Banner -->
  <section class="reveal-item page-banner">
    <div class="container">
      <h1>Multiplica el Impacto</h1>
    </div>
  </section>

  <!-- Donation Form -->
  <section class="reveal-item section">
    <div class="container">
      <div class="donation-card">
        <h2>Únete a la Causa</h2>
        <form id="ngo-form">
          <div class="form-group">
            <label>Tu Nombre</label>
            <input type="text" class="form-control" required placeholder="Ingresa tu nombre">
          </div>
          <div class="form-group">
            <label>Tu Correo</label>
            <input type="email" class="form-control" required placeholder="tu@correo.com">
          </div>
          <div class="form-group">
            <label>Cantidad de Árboles a Patrocinar ($5 USD por árbol)</label>
            <input type="number" class="form-control" min="1" max="1000" required placeholder="Ej. 10">
          </div>
          <button type="submit" class="btn-donate">Patrocinar Siembra</button>
        </form>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="main-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <h3>Raíces Vivas</h3>
        <p>Restauración Ecológica Participativa</p>
      </div>
      <div class="footer-dev">
        <span>Desarrollado por</span>
        <a href="../index.html" class="footer-logo-link" aria-label="Ir a Blyp">
          <img src="../blyp_logotipo.svg" alt="Blyp Logo" class="footer-logo">
        </a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
