<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto | ArcoBase</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Preloader -->
  <div class="preloader"><div class="preloader-spinner"></div></div>


  <!-- Navigation -->
  <nav class="main-nav">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">ARCOBASE</a>
      <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="servicios.html">Proyectos</a></li>
        <li><a href="contacto.html" class="active">Contacto</a></li>
      </ul>
      <button class="hamburger" aria-label="Menú">
        <i data-lucide="menu"></i>
      </button>
    </div>
  </nav>

  <!-- Page Banner -->
  <section class="reveal-item page-banner">
    <div class="container">
      <h1>Hablemos de Estructuras</h1>
    </div>
  </section>

  <!-- Contact Form -->
  <section class="reveal-item section">
    <div class="container">
      <div class="brutal-form-card">
        <form id="brutal-contact">
          <div class="form-group">
            <label>Nombre del Cliente</label>
            <input type="text" class="brutal-input" required placeholder="Ej. Javier Pérez">
          </div>
          <div class="form-group">
            <label>Correo Electrónico</label>
            <input type="email" class="brutal-input" required placeholder="tu@correo.com">
          </div>
          <div class="form-group">
            <label>Descripción del Proyecto</label>
            <textarea class="brutal-input" rows="5" required placeholder="Detalla las dimensiones y requerimientos..."></textarea>
          </div>
          <button type="submit" class="btn-brutal" style="width: 100%;">Registrar Postulación</button>
        </form>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="main-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <h3>ARCOBASE</h3>
        <p>Arquitectura Brutalista Expuesta</p>
      </div>
      <div class="footer-dev">
        <span>Desarrollado por</span>
        <a href="../index.html" class="footer-logo-link" aria-label="Ir a Blyp">
          <img src="../blyp_logotipo.svg" alt="Blyp Logo" class="footer-logo">
        </a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
