<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Flotas | VoltRuta</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Preloader -->
  <div class="preloader"><div class="preloader-spinner"></div></div>


  <!-- Navigation -->
  <nav class="main-nav">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">VOLTRUTA</a>
      <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="servicios.html">Estaciones</a></li>
        <li><a href="contacto.html" class="active">Acceso</a></li>
        <li><a href="contacto.html" class="nav-cta">Descargar App</a></li>
      </ul>
      <button class="hamburger" aria-label="Menú">
        <i data-lucide="menu"></i>
      </button>
    </div>
  </nav>

  <!-- Page Banner -->
  <section class="reveal-item page-banner">
    <div class="container">
      <h1>Inicia en la red eléctrica</h1>
    </div>
  </section>

  <!-- Contact Form -->
  <section class="reveal-item section">
    <div class="container">
      <div class="cyber-form-card">
        <form id="cyber-contact">
          <div class="form-group">
            <label>Identidad de Conexión</label>
            <input type="text" class="cyber-input" required placeholder="Tu Nombre">
          </div>
          <div class="form-group">
            <label>Correo Electrónico Seguro</label>
            <input type="email" class="cyber-input" required placeholder="tu@correo.com">
          </div>
          <div class="form-group">
            <label>Frecuencia de Carga Mensual</label>
            <input type="text" class="cyber-input" required placeholder="Ej. Diaria, Semanal...">
          </div>
          <button type="submit" class="btn-neon" style="width: 100%;">Registrar Conexión</button>
        </form>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="main-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <h3>VOLTRUTA</h3>
        <p>Soluciones Inteligentes de Energía Eléctrica</p>
      </div>
      <div class="footer-dev">
        <span>Desarrollado por</span>
        <a href="../index.html" class="footer-logo-link" aria-label="Ir a Blyp">
          <img src="../blyp_logotipo.svg" alt="Blyp Logo" class="footer-logo">
        </a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
